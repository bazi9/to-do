<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ToDo App</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="min-height: 100vh;">
    
    <div class="card shadow-sm border-0" style="max-width: 400px; width: 100%; border-radius: 12px;">
        <div class="card-body p-4 p-md-5">
            <h2 class="text-center font-weight-bold mb-4" style="color: #343a40;">Login</h2>
            
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                    <div class="alert alert-{{ category }} shadow-sm">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form action="/login" method="POST">
                <div class="form-group">
                    <label class="font-weight-bold text-secondary">Username</label>
                    <input type="text" name="username" class="form-control modern-input shadow-sm" required autofocus>
                </div>
                <div class="form-group mb-4">
                    <label class="font-weight-bold text-secondary">Password</label>
                    <input type="password" name="password" class="form-control modern-input shadow-sm" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block font-weight-bold shadow-sm py-2">Login</button>
            </form>
            
            <div class="text-center mt-4">
                <p class="text-muted mb-0">Don't have an account? <a href="/register" class="text-primary font-weight-bold text-decoration-none">Register here</a></p>
                <a href="/welcome" class="text-secondary small mt-2 d-inline-block">Back to home</a>
            </div>
        </div>
    </div>

</body>
</html>
